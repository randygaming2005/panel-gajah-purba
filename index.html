<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAJAH PURBA DASHBOARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@800&family=Fredoka:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --anime-blue: #3b82f6;
            --anime-pink: #f472b6;
            --anime-yellow: #fbbf24;
            --bg-main: #f0f2f5;
        }
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--bg-main);
            color: #334155;
        }
        .font-anime { font-family: 'M PLUS Rounded 1c', sans-serif; }
        
        .sidebar-item {
            clip-path: polygon(0 0, 100% 0, 90% 100%, 0% 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar-item:hover {
            transform: translateX(10px);
            background-color: white;
        }
        .sidebar-active {
            background-color: var(--anime-blue);
            color: white;
            box-shadow: 5px 5px 0px #1e3a8a;
        }

        .anime-card {
            background: white;
            border: 3px solid #1e293b;
            box-shadow: 8px 8px 0px #1e293b;
            transition: all 0.2s ease;
        }
        .anime-card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0px #3b82f6;
        }

        .btn-burst {
            background: #1e293b;
            color: white;
            border: 2px solid #1e293b;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .btn-burst:hover {
            background: var(--anime-blue);
            transform: skew(-10deg);
            box-shadow: 5px 5px 0px #1e3a8a;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-72 bg-white border-r-4 border-slate-800 flex flex-col p-6 gap-8">
        <div class="flex flex-col items-center gap-4">
            <div class="w-24 h-24 border-4 border-slate-800 rounded-2xl overflow-hidden shadow-[6px_6px_0px_#1e293b]">
                <img src="https://i.ibb.co/Jj18Nz5H/photo-2026-04-27-18-07-46.jpg" alt="Logo" class="w-full h-full object-cover">
            </div>
            <h1 class="font-anime font-extrabold text-2xl tracking-tighter uppercase italic text-slate-800 text-center leading-none">
                GAJAH <span class="text-blue-600 block">PURBA</span>
            </h1>
        </div>

        <nav class="space-y-4">
            <div onclick="switchCategory('admin')" id="tab-admin" class="sidebar-item sidebar-active p-4 cursor-pointer flex items-center gap-3">
                <i class="fas fa-user-shield"></i>
                <span class="font-bold tracking-wide uppercase">Open Admin</span>
            </div>
            <div onclick="switchCategory('promo')" id="tab-promo" class="sidebar-item p-4 cursor-pointer flex items-center gap-3 font-bold text-slate-400 hover:text-blue-500">
                <i class="fas fa-tags"></i>
                <span class="tracking-wide uppercase">Promo</span>
            </div>
        </nav>

        <div class="mt-auto text-[10px] font-bold text-slate-300 text-center uppercase tracking-[0.2em]">
            System Status: Overdrive
        </div>
    </aside>

    <main class="flex-1 flex flex-col">
        <header class="h-24 bg-white border-b-4 border-slate-800 flex items-center justify-between px-12 relative overflow-hidden">
            <div class="absolute -right-10 top-0 h-full w-40 bg-blue-500 skew-x-[-20deg] opacity-10"></div>
            <h2 id="header-title" class="font-anime font-extrabold text-3xl italic uppercase text-slate-800">Admin Control</h2>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <span class="block text-[10px] font-bold text-blue-500 uppercase italic">Power Level: 9999</span>
                    <span class="font-black text-slate-800">COMMANDER_ALPHA</span>
                </div>
                <div class="w-12 h-12 rounded-lg border-2 border-slate-800 bg-blue-100 flex items-center justify-center">
                    <i class="fas fa-user-cog text-blue-600"></i>
                </div>
            </div>
        </header>

        <div class="flex-1 p-10 overflow-y-auto">
            
            <div id="grid-admin" class="space-y-12">
                <div>
                    <h3 class="font-anime text-sm font-black text-blue-600 uppercase tracking-widest mb-6 flex items-center gap-2">
                        <span class="w-8 h-1 bg-blue-600"></span> Individual_Modules
                    </h3>
                    <div class="grid grid-cols-4 gap-6">
                        <div class="anime-card p-6 flex flex-col gap-4">
                            <h4 class="font-black text-xl italic uppercase">UBO</h4>
                            <button onclick="runBot('UBO')" class="btn-burst py-2 font-bold text-[10px] italic uppercase">Open Session</button>
                        </div>
                        <div class="anime-card p-6 flex flex-col gap-4">
                            <h4 class="font-black text-xl italic uppercase">POKER</h4>
                            <button onclick="runBot('POKER')" class="btn-burst py-2 font-bold text-[10px] italic uppercase">Open Session</button>
                        </div>
                        <div class="anime-card p-6 flex flex-col gap-4">
                            <h4 class="font-black text-xl italic uppercase">LB</h4>
                            <button onclick="runBot('LB')" class="btn-burst py-2 font-bold text-[10px] italic uppercase">Open Session</button>
                        </div>
                        <div class="anime-card p-6 flex flex-col gap-4">
                            <h4 class="font-black text-sm italic uppercase">Audit Macao</h4>
                            <button onclick="runBot('AUDIT_MACAO')" class="btn-burst py-2 font-bold text-[10px] italic uppercase">Open Session</button>
                        </div>
                    </div>
                </div>

                <div class="bg-blue-50 p-8 border-4 border-dashed border-blue-400 rounded-3xl">
                    <div class="flex justify-between items-center mb-8">
                        <h3 class="font-anime text-sm font-black text-blue-600 uppercase tracking-widest flex items-center gap-2">
                            <span class="w-8 h-1 bg-blue-600"></span> Global_Admin_List
                        </h3>
                        <button onclick="runAllAdminGroup()" class="px-8 py-3 bg-yellow-400 border-4 border-slate-800 font-black text-slate-800 uppercase italic hover:bg-yellow-300 transform -rotate-2 hover:rotate-0 transition-all shadow-[6px_6px_0px_#1e293b]">
                            Execute ALL Groups! <i class="fas fa-bolt ml-2"></i>
                        </button>
                    </div>
                    <div class="grid grid-cols-4 gap-6">
                        <div class="anime-card p-5 bg-white border-blue-500">
                            <h4 class="font-black text-xs mb-4 uppercase">All Admin Toto</h4>
                            <button onclick="runBot('ALL_ADMIN_TOTO')" class="w-full bg-slate-800 text-white py-2 text-[10px] font-bold rounded hover:bg-blue-500">OPEN</button>
                        </div>
                        <div class="anime-card p-5 bg-white border-blue-500">
                            <h4 class="font-black text-xs mb-4 uppercase">All Admin WL</h4>
                            <button onclick="runBot('ALL_ADMIN_WL')" class="w-full bg-slate-800 text-white py-2 text-[10px] font-bold rounded hover:bg-blue-500">OPEN</button>
                        </div>
                        <div class="anime-card p-5 bg-white border-blue-500">
                            <h4 class="font-black text-xs mb-4 uppercase">All Admin P21</h4>
                            <button onclick="runBot('ALL_ADMIN_P21')" class="w-full bg-slate-800 text-white py-2 text-[10px] font-bold rounded hover:bg-blue-500">OPEN</button>
                        </div>
                        <div class="anime-card p-5 bg-white border-blue-500">
                            <h4 class="font-black text-xs mb-4 uppercase">All Admin Citi</h4>
                            <button onclick="runBot('ALL_ADMIN_CITI')" class="w-full bg-slate-800 text-white py-2 text-[10px] font-bold rounded hover:bg-blue-500">OPEN</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="grid-promo" class="hidden">
                <div class="grid grid-cols-4 gap-6">
                    <div class="anime-card p-6 flex flex-col gap-4 border-pink-500 shadow-[8px_8px_0px_#f472b6]">
                        <h4 class="font-black text-lg italic uppercase">TOTO Depo</h4>
                        <button onclick="runBot('TOTO_DEPO')" class="py-2 bg-pink-500 text-white font-bold text-xs rounded shadow-[4px_4px_0px_#be185d] active:shadow-none active:translate-x-1 active:translate-y-1 transition-all uppercase italic">Jalankan Macro</button>
                    </div>
                    <div class="anime-card p-6 flex flex-col gap-4 border-pink-500 shadow-[8px_8px_0px_#f472b6]">
                        <h4 class="font-black text-lg italic uppercase">CITI Depo</h4>
                        <button onclick="runBot('CITI_DEPO')" class="py-2 bg-pink-500 text-white font-bold text-xs rounded shadow-[4px_4px_0px_#be185d] active:shadow-none active:translate-x-1 active:translate-y-1 transition-all uppercase italic">Jalankan Macro</button>
                    </div>
                    <div class="anime-card p-6 flex flex-col gap-4 border-pink-500 shadow-[8px_8px_0px_#f472b6]">
                        <h4 class="font-black text-lg italic uppercase">CITI To</h4>
                        <button onclick="runBot('CITI_TO')" class="py-2 bg-pink-500 text-white font-bold text-xs rounded shadow-[4px_4px_0px_#be185d] active:shadow-none active:translate-x-1 active:translate-y-1 transition-all uppercase italic">Jalankan Macro</button>
                    </div>
                    <div class="anime-card p-6 flex flex-col gap-4 border-pink-500 shadow-[8px_8px_0px_#f472b6]">
                        <h4 class="font-black text-lg italic uppercase">CITI IP</h4>
                        <button onclick="runBot('CITI_IP')" class="py-2 bg-pink-500 text-white font-bold text-xs rounded shadow-[4px_4px_0px_#be185d] active:shadow-none active:translate-x-1 active:translate-y-1 transition-all uppercase italic">Jalankan Macro</button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        function switchCategory(cat) {
            const isAdmin = cat === 'admin';
            document.getElementById('grid-admin').classList.toggle('hidden', !isAdmin);
            document.getElementById('grid-promo').classList.toggle('hidden', isAdmin);
            
            document.getElementById('tab-admin').classList.toggle('sidebar-active', isAdmin);
            document.getElementById('tab-promo').classList.toggle('sidebar-active', !isAdmin);
            
            document.getElementById('header-title').innerText = isAdmin ? "Admin Control" : "Promo Systems";
            document.getElementById('header-title').style.color = isAdmin ? "#3b82f6" : "#f472b6";
        }

        function runBot(botId) {
            // URL MENGARAH KE KOMPUTER MASING-MASING PENGGUNA
            fetch(`http://localhost:3000/run-bot/${botId}`)
                .then(res => res.text())
                .then(msg => console.log("System response:", msg))
                .catch(err => {
                    alert("Gagal terhubung! Pastikan Bridge lokal (server.js) sudah dijalankan di komputer Anda.");
                    console.error(err);
                });
        }

        function runAllAdminGroup() {
            const adminList = ['ALL_ADMIN_TOTO', 'ALL_ADMIN_WL', 'ALL_ADMIN_P21', 'ALL_ADMIN_CITI'];
            if(confirm("AKTIFKAN SEMUA MODUL ADMIN?")) {
                adminList.forEach(id => runBot(id));
            }
        }
    </script>
</body>
</html>
